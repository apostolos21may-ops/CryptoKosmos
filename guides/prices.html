<script>
/* ========================= HELPERS + CONFIG ========================= */
const $ = (id) => document.getElementById(id);
const PER_PAGE = 200;
const TOTAL_PAGES = 10;
const REFRESH_MS = 30_000;
let cgCooldownUntil = 0;
let hasLoadedOnce = false;

function setStatus(text = "", type = "loading") {
  const el = $("status");
  if (!el) return;
  el.textContent = text || "";
  el.className = `status ${type}`.trim();
  el.style.display = text ? "block" : "none";
}

const memCache = new Map();
const FETCH_TIMEOUT = 12000;
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function fetchJSON(url, { signal, timeout = FETCH_TIMEOUT } = {}) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeout);
  if (signal) signal.addEventListener("abort", () => ctrl.abort(), { once: true });
  try {
    const res = await fetch(url, { cache: "no-store", signal: ctrl.signal, headers: { accept: "application/json" } });
    return res;
  } finally { clearTimeout(t); }
}

/* ========================= STATE ========================= */
let sourceMode = "auto";
let currentPage = 1;
let allRows = [];
let abortCtrl = null;
let requestId = 0;

/* ========================= CACHE ========================= */
function cacheKeyCG(vs, page) { return `ck:cg_rows:${vs}:p${page}:pp${PER_PAGE}`; }
function readCache(key, maxAgeMs = 30 * 60_000) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj?.t || !obj?.data) return null;
    if (Date.now() - obj.t > maxAgeMs) return null;
    return obj.data;
  } catch { return null; }
}
function writeCache(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ t: Date.now(), data })); } catch {}
}



/* ========================= BINANCE ========================= */
const BINANCE_TICKER_KEY = "ck:binance_ticker_map";
let binanceMap = null;

function buildBinanceMap(data) {
  const map = {};
  if (!Array.isArray(data)) return map;
  for (const t of data) {
    const sym = t?.symbol;
    if (!sym || !sym.endsWith("USDT")) continue;
    const base = sym.slice(0, -4);
    const price = Number(t.lastPrice);
    const chg = Number(t.priceChangePercent);
    const vol = Number(t.quoteVolume);
    if (!Number.isFinite(price)) continue;
    map[base] = { price, chg, vol };
  }
  return map;
}

async function fetchBinanceTickers({ signal, force = false } = {}) {
  if (binanceMap && !force) return binanceMap;
  if (!force) {
    const cached = readCache(BINANCE_TICKER_KEY, 60_000);
    if (cached) {
      binanceMap = cached;
      refreshBinanceInBackground();
      return binanceMap;
    }
  }
  const res = await fetchJSON("https://api.binance.com/api/v3/ticker/24hr", { signal, timeout: 10000 });
  if (!res.ok) throw new Error(`BINANCE_${res.status}`);
  const data = await res.json();
  const map = buildBinanceMap(data);
  writeCache(BINANCE_TICKER_KEY, map);
  binanceMap = map;
  return map;
}

async function refreshBinanceInBackground() {
  try {
    const res = await fetch("https://api.binance.com/api/v3/ticker/24hr", { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    const map = buildBinanceMap(data);
    writeCache(BINANCE_TICKER_KEY, map);
    binanceMap = map;
    if (sourceMode === "binance") render(allRows);
  } catch {}
}

/* Εφαρμόζει τις τιμές Binance πάνω στα CoinGecko rows όταν sourceMode = "binance" */
function applySourceData(rows) {
  const safe = Array.isArray(rows) ? rows : [];
  if (sourceMode !== "binance") return safe;
  if (!binanceMap) return safe; // δεν φόρτωσε ακόμα -> δείξε CoinGecko προσωρινά
  return safe
    .map(r => {
      const b = binanceMap[r.symbol];
      if (!b) return null; // δεν υπάρχει pair στο Binance -> κρύψε
      return { ...r, price: b.price, chg: b.chg };
    })
    .filter(Boolean);
}



/* ========================= UI HELPERS ========================= */
function setActiveSource(id) {
  document.querySelectorAll(".segmented button").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add("active");
  const meta = $("meta-source");
  if (meta) meta.textContent = "Source: " + (id === "src-binance" ? "Binance" : id === "src-coingecko" ? "CoinGecko" : "Auto");
}

function formatPrice(n) {
  const num = Number(n);
  if (!Number.isFinite(num)) return "—";
  const abs = Math.abs(num);
  if (abs >= 1)    return "$" + num.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (abs >= 0.01) return "$" + num.toLocaleString(undefined, { maximumFractionDigits: 4 });
  return "$" + num.toLocaleString(undefined, { maximumFractionDigits: 8 });
}

function chgClass(v) {
  const num = Number(v);
  if (!Number.isFinite(num)) return "flat";
  return num > 0 ? "up" : num < 0 ? "down" : "flat";
}

function arrow(v) {
  const num = Number(v);
  if (!Number.isFinite(num)) return "•";
  return num > 0 ? "▲" : num < 0 ? "▼" : "•";
}

/* ========================= SPARKLINE ========================= */
function drawSparkline(data, color) {
  if (!Array.isArray(data) || data.length < 2) return "";
  const clean = data.map(Number).filter(Number.isFinite);
  if (clean.length < 2) return "";
  const w = 90, h = 28;
  const min = Math.min(...clean), max = Math.max(...clean);
  const range = (max - min) || 1;
  const pts = clean.map((v, i) => {
    const x = (i / (clean.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" aria-hidden="true" focusable="false">
    <polyline fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" points="${pts}" />
  </svg>`;
}

/* ========================= RENDER ========================= */
function render(rows) {
  rows = applySourceData(rows);
  const input = $("q");
  const q = (input?.value || "").trim().toUpperCase();
  const safeRows = Array.isArray(rows) ? rows : [];
  const list = !q ? safeRows : safeRows.filter(r => {
    const sym  = String(r.symbol || "").toUpperCase();
    const name = String(r.name   || "").toUpperCase();
    return sym.includes(q) || name.includes(q);
  });

  const metaCount = $("meta-count");
  if (metaCount) metaCount.textContent = "Coins: " + list.length;

  const listEl = $("list");
  if (!listEl) return;

  const startRank = (currentPage - 1) * PER_PAGE + 1;

  listEl.innerHTML = list.map((r, i) => {
    const chgNum  = Number(r.chg);
    const chgText = Number.isFinite(chgNum) ? chgNum.toFixed(2) + "%" : "—";
    const rank = startRank + i;
    const sparkColor = Number.isFinite(chgNum) ? (chgNum > 0 ? "#4ade80" : chgNum < 0 ? "#f87171" : "#94a3b8") : "#94a3b8";
    const sparkData = Array.isArray(r.spark) ? r.spark : [];
    const icon = r.icon ? `<img class="coin-icon" src="${r.icon}" loading="lazy" alt="">` : `<div class="coin-icon skeleton"></div>`;

    return `
      <div class="price-row">
        <div class="rank">${rank}</div>
        <div class="coin-wrap">
          ${icon}
          <div class="name mobile-name">${r.name || ""}</div>
        </div>
        <div class="sub">
          <div class="sym">${r.symbol || "—"}</div>
          <div class="name desktop-name">${r.name || ""}</div>
        </div>
        <div class="chg ${chgClass(chgNum)}">
          <span class="arrow">${arrow(chgNum)}</span>
          <span>${chgText}</span>
        </div>
        <div class="price-wrap">
          <div class="price">${formatPrice(r.price)}</div>
          <div class="spark">${rank <= 10 ? drawSparkline(sparkData, sparkColor) : ""}</div>
        </div>
      </div>`;
  }).join("");
}

function renderSkeleton(count = 20) {
  const listEl = $("list");
  if (!listEl) return;
  const row = `
    <div class="price-row skeleton-row">
      <div class="rank skeleton"></div>
      <div class="coin-wrap"><div class="coin-icon skeleton"></div></div>
      <div class="sub">
        <div class="sym skeleton"></div>
        <div class="name skeleton"></div>
      </div>
      <div class="chg skeleton"></div>
      <div class="price-wrap"><div class="price skeleton"></div></div>
    </div>`;
  listEl.innerHTML = Array.from({ length: count }, () => row).join("");
}

/* ========================= PAGINATION ========================= */
function renderPagination() {
  const wrap = document.querySelector(".pages");
  if (!wrap) return;
  wrap.innerHTML = "";
  const isMobile = window.innerWidth <= 600;
  const total = TOTAL_PAGES, current = currentPage;

  const addPage = p => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "page-btn" + (p === current ? " active" : "");
    b.textContent = String(p);
    b.addEventListener("click", () => goToPage(p));
    wrap.appendChild(b);
  };
  const addDots = () => {
    const s = document.createElement("span");
    s.className = "dots"; s.textContent = "…";
    wrap.appendChild(s);
  };

  if (!isMobile) {
    for (let i = 1; i <= total; i++) addPage(i);
  } else {
    addPage(1);
    if (current > 3) addDots();
    for (let i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) addPage(i);
    if (current < total - 2) addDots();
    if (total > 1) addPage(total);
  }

  const prevBtn = document.querySelector(".page-btn.prev");
  const nextBtn = document.querySelector(".page-btn.next");
  if (prevBtn) prevBtn.disabled = current === 1;
  if (nextBtn) nextBtn.disabled = current === total;
}

function goToPage(p) {
  if (p === currentPage) return;
  currentPage = p;
  try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch { window.scrollTo(0, 0); }
  loadPage(true);
}

/* ========================= FETCH CoinGecko ========================= */
async function fetchCoinGeckoRows({ vs = "usd", page = 1, signal } = {}) {
  const key = cacheKeyCG(vs, page);
  if (memCache.has(key)) return memCache.get(key);
  const cached = readCache(key);
  if (cached) {
    memCache.set(key, cached);
    refreshCoinGeckoInBackground({ vs, page, key }).catch(() => {});
    return cached;
  }
  if (Date.now() < cgCooldownUntil) throw new Error("RATE_LIMIT");

  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=${encodeURIComponent(vs)}&order=market_cap_desc&per_page=${PER_PAGE}&page=${page}&sparkline=false&price_change_percentage=24h`;
  const res = await fetchJSON(url, { signal });
  if (res.status === 429) {
    const ra = parseInt(res.headers.get("retry-after") || "60", 10);
    cgCooldownUntil = Date.now() + Math.max(ra, 20) * 1000;
    throw new Error("RATE_LIMIT");
  }
  if (!res.ok) throw new Error(`CG_${res.status}`);
  const data = await res.json();
  const rows = Array.isArray(data) ? data.map(c => ({
    symbol: String(c?.symbol || "").toUpperCase(),
    name: String(c?.name || ""),
    icon: String(c?.image || ""),
    price: Number(c?.current_price),
    chg: Number(c?.price_change_percentage_24h),
    spark: []
  })) : [];
  writeCache(key, rows);
  memCache.set(key, rows);
  return rows;
}

async function refreshCoinGeckoInBackground({ vs, page, key }) {
  if (Date.now() < cgCooldownUntil) return;
  const url = `https://api.coingecko.com/api/v3/coins/markets?vs_currency=${encodeURIComponent(vs)}&order=market_cap_desc&per_page=${PER_PAGE}&page=${page}&sparkline=false&price_change_percentage=24h`;
  const res = await fetch(url, { cache: "no-store" });
  if (res.status === 429) { cgCooldownUntil = Date.now() + 60000; return; }
  if (!res.ok) return;
  const data = await res.json();
  const rows = Array.isArray(data) ? data.map(c => ({
    symbol: String(c?.symbol || "").toUpperCase(),
    name: String(c?.name || ""),
    icon: String(c?.image || ""),
    price: Number(c?.current_price),
    chg: Number(c?.price_change_percentage_24h),
    spark: []
  })) : [];
  writeCache(key, rows);
  const metaUpdated = $("meta-updated");
  if (metaUpdated) metaUpdated.textContent = "Updated: " + new Date().toLocaleTimeString();
}

/* ========================= LOAD PAGE ========================= */
async function loadPage(isPageChange = false) {
  const token = ++requestId;
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  const key = cacheKeyCG("usd", currentPage);
  const instant = memCache.get(key) || readCache(key);
  if (instant) {
    allRows = instant;
    memCache.set(key, instant);
    render(allRows);
    renderPagination();
    setStatus("Updating…", "warn");
    hasLoadedOnce = true;
  } else {
    renderSkeleton(20);
    setStatus("Loading prices…", "loading");
  }
  


   try {
    await sleep(120);
    if (token !== requestId) return;
    const rows = await fetchCoinGeckoRows({ vs: "usd", page: currentPage, signal: abortCtrl.signal });
    if (token !== requestId) return;
    allRows = rows;
    render(allRows);
    renderPagination();
    setStatus("", "");
    hasLoadedOnce = true;
    prefetchNext();
    if (!binanceMap) fetchBinanceTickers().catch(() => {});
  } catch (e) {
    // Μία επανάληψη για μη rate-limit σφάλματα (π.χ. προσωρινό network blip)
    if (e?.message !== "RATE_LIMIT") {
      try {
        await sleep(900);
        if (token !== requestId) return;
        const rows = await fetchCoinGeckoRows({ vs: "usd", page: currentPage, signal: abortCtrl.signal });
        if (token !== requestId) return;
        allRows = rows;
        render(allRows);
        renderPagination();
        setStatus("", "");
        hasLoadedOnce = true;
        prefetchNext();
        if (!binanceMap) fetchBinanceTickers().catch(() => {});
        return;
      } catch (e2) { e = e2; }
    }

    const fallback = memCache.get(key) || readCache(key, 24 * 60 * 60_000);
    if (fallback) {
      allRows = fallback; memCache.set(key, fallback);
      render(allRows); renderPagination();
      setStatus("Showing cached data.", "warn");
      hasLoadedOnce = true;
      return;
    }

    // Τελευταία λύση: τιμές απευθείας από Binance (ταξινομημένες κατά 24h volume)
    try {
      const bmap = await fetchBinanceTickers();
      const rows = Object.entries(bmap)
        .sort((a, b) => (b[1].vol || 0) - (a[1].vol || 0))
        .slice(0, PER_PAGE)
        .map(([sym, v]) => ({ symbol: sym, name: sym, icon: "", price: v.price, chg: v.chg, spark: [] }));
      allRows = rows;
      render(allRows); renderPagination();
      setStatus("CoinGecko unavailable — showing Binance data.", "warn");
      hasLoadedOnce = true;
    } catch {
      setStatus("Connection failed.", "error");
    }
  }
}

function prefetchNext() {
  const next = currentPage + 1;
  if (next > TOTAL_PAGES) return;
  const key = cacheKeyCG("usd", next);
  if (memCache.has(key) || readCache(key)) return;
  fetchCoinGeckoRows({ vs: "usd", page: next }).then(rows => memCache.set(key, rows)).catch(() => {});
}

/* ========================= INIT ========================= */
function bindClick(id, fn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("click", e => { e.preventDefault(); fn(); });
}

document.addEventListener("DOMContentLoaded", () => {
 bindClick("src-auto", () => {
    sourceMode = "auto";
    setActiveSource("src-auto");
    render(allRows);
  });

  bindClick("src-binance", () => {
    sourceMode = "binance";
    setActiveSource("src-binance");
    if (binanceMap) {
      render(allRows);
    } else {
      setStatus("Loading Binance prices…", "loading");
      fetchBinanceTickers()
        .then(() => { setStatus("", ""); render(allRows); })
        .catch(() => { setStatus("Binance unavailable — showing CoinGecko.", "warn"); render(allRows); });
    }
  });

  bindClick("src-coingecko", () => {
    sourceMode = "coingecko";
    setActiveSource("src-coingecko");
    render(allRows);
  });

  $("q")?.addEventListener("input", () => render(allRows));

  document.querySelector(".page-btn.prev")?.addEventListener("click", e => {
    e.preventDefault();
    if (currentPage > 1) goToPage(currentPage - 1);
  });
  document.querySelector(".page-btn.next")?.addEventListener("click", e => {
    e.preventDefault();
    if (currentPage < TOTAL_PAGES) goToPage(currentPage + 1);
  });

  const cached = readCache(cacheKeyCG("usd", currentPage));
  if (cached && !hasLoadedOnce) {
    allRows = cached; render(allRows); renderPagination();
    setStatus("Δείχνω cached τιμές…", "warn");
    hasLoadedOnce = true;
  }

  setActiveSource("src-auto");
  loadPage(false);

  setInterval(() => {
    if (document.visibilityState === "visible") loadPage(false);
  }, REFRESH_MS);
});
